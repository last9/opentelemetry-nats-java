name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["11", "17", "21"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: gradle

      - name: Build and test
        run: ./gradlew test assemble

      - name: Upload JAR
        if: matrix.java-version == '17'
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ github.sha }}
          retention-days: 14
          path: build/libs/opentelemetry-nats-java-*.jar
