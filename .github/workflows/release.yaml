name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Test
        run: ./gradlew test

  release:
    needs: test
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR merge commit
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git fetch origin main
          git checkout "$MERGE_SHA"

      - name: Check if version changed
        id: version_change
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          PREV_COMMIT=$(git rev-parse "${MERGE_SHA}^")
          OLD_VERSION=$(git show "${PREV_COMMIT}:build.gradle.kts" | grep '^version = ' | sed 's/version = "\(.*\)"/\1/')
          NEW_VERSION=$(grep '^version = ' build.gradle.kts | sed 's/version = "\(.*\)"/\1/')
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          [ "$OLD_VERSION" != "$NEW_VERSION" ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        if: steps.version_change.outputs.changed == 'true'
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build
        if: steps.version_change.outputs.changed == 'true'
        run: ./gradlew assemble

      - name: Create tag
        if: steps.version_change.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.version_change.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Publish to Maven Central
        if: steps.version_change.outputs.changed == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: F66DE47944D32F14
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache

      - name: Create GitHub Release
        if: steps.version_change.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version_change.outputs.new_version }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --generate-notes \
            "build/libs/opentelemetry-nats-java-${NEW_VERSION}.jar"
